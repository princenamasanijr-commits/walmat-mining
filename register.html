<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Walmart Mining - Register</title>
        <link rel="stylesheet" href="css/style.css">

        <!-- Page-specific style -->
        <style>
                body {
                        background: linear-gradient(180deg, #0a0f1f, #121b38);
                        color: #ffffff;
                }
                .header {
                        background: #0c102b;
                }
                .card {
                        background: #10193f;
                }
                .btn-primary {
                        background: #ffc107;
                        color: black;
                }
                .btn-secondary {
                        background: #1f2335;
                        color: #ffc107;
                }
        </style>
</head>
<body>

<!-- Header -->
<header class="header">
        <div class="logo">Walmart Mining</div>
        <div>
                <a href="login.html" class="btn-secondary">Log In</a>
        </div>
</header>

<!-- Registration Card -->
<section class="card" style="max-width:450px; margin:40px auto; padding:30px;">
        <h2>Create Account</h2>
        <p>Sign up now to start earning with Walmart Mining.</p>
        <form id="register-form">
                <input type="text" name="username" placeholder="Username" required>
                <input type="email" name="email" placeholder="Email Address (Used for notifications)" required>
                <input type="password" name="password" placeholder="Password" required>
                <input type="text" name="referral" placeholder="Referral Username (Optional)">

                <p style="font-size:13px; margin-bottom:12px;">
                        By registering, you agree to our <a href="#" style="color:#ffc107;">Terms of Service</a>. No email verification required.
                </p>

                <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <p style="margin-top:12px; font-size:13px;">
                Already have an account? <a href="login.html" style="color:#ffc107;">Log In</a>
        </p>
</section>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <a class="nav-item" href="dashboard.html">🏠<br>Home</a>
    <a class="nav-item" href="deposit.html">⬇️<br>Deposit</a>
    <a class="nav-item" href="withdraw.html">⬆️<br>Withdraw</a>
    <a class="nav-item" href="team.html">👥<br>Team</a>
</div>

<!-- JS -->
<script src="js/app.js"></script>
</body>
</html>
